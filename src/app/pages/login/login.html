<section class="auth-card">
  <h2>{{ forgotMode ? 'Reset Password' : 'Login' }}</h2>

  <p class="subtitle">
    {{
      forgotMode
        ? 'Enter your email and we’ll send a reset link.'
        : 'Welcome back. Sign in to manage your restaurant.'
    }}
  </p>

  <p *ngIf="error" class="error">{{ error }}</p>

  <p *ngIf="resetMessage" class="success">{{ resetMessage }}</p>

  <!-- LOGIN FORM -->
  <form *ngIf="!forgotMode" (ngSubmit)="submit()">
    <label>
      Email
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        required
        autocomplete="email"
        placeholder="you@example.com"
      />
    </label>

    <label>
      Password
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        required
        minlength="6"
        autocomplete="current-password"
        placeholder="••••••••"
      />
    </label>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="helper">
      <a (click)="openForgot()" role="button" tabindex="0">Forgot password?</a>
      <a routerLink="/register">Create account</a>
    </p>
  </form>

  <!-- FORGOT PASSWORD FORM -->
  <form *ngIf="forgotMode" (ngSubmit)="requestReset()">
    <label>
      Email
      <input
        type="email"
        [(ngModel)]="resetEmail"
        name="resetEmail"
        required
        autocomplete="email"
        placeholder="you@example.com"
      />
    </label>

    <button type="submit" [disabled]="resetLoading">
      {{ resetLoading ? 'Sending...' : 'Send reset link' }}
    </button>

    <p class="helper">
      <a (click)="closeForgot()" role="button" tabindex="0">Back to login</a>
    </p>
  </form>
</section>
