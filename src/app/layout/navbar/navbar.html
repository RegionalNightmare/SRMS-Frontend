<header class="nav-wrap">
  <nav class="nav" aria-label="Primary">
    <a routerLink="/" class="brand" (click)="closeMenu()">ARMS</a>

    <!-- Desktop links -->
    <div class="nav-links desktop">
      <a routerLink="/menu" routerLinkActive="active" (click)="closeMenu()">Menu</a>

      <a *ngIf="auth.isLoggedIn()" routerLink="/orders" routerLinkActive="active" (click)="closeMenu()">
        Orders
      </a>
      <a *ngIf="auth.isLoggedIn()" routerLink="/reservations" routerLinkActive="active" (click)="closeMenu()">
        Reservations
      </a>
      <a *ngIf="auth.isLoggedIn()" routerLink="/events" routerLinkActive="active" (click)="closeMenu()">
        Events
      </a>

      <!-- Desktop admin dropdown -->
      <div
        *ngIf="auth.isAdmin()"
        class="admin-dropdown"
        (mouseenter)="openAdminMenu()"
        (mouseleave)="closeAdminMenu()"
      >
        <button
          type="button"
          class="admin-trigger"
          [class.active]="adminMenuOpen"
          (click)="toggleAdminMenu()"
          aria-haspopup="true"
          [attr.aria-expanded]="adminMenuOpen"
        >
          Admin
          <span class="caret">▾</span>
        </button>

        <div class="admin-dropdown-menu" *ngIf="adminMenuOpen">
          <a routerLink="/admin" routerLinkActive="active" (click)="closeAdminMenu()">Dashboard</a>
          <a routerLink="/admin/menu" routerLinkActive="active" (click)="closeAdminMenu()">Menu</a>
          <a routerLink="/admin/orders" routerLinkActive="active" (click)="closeAdminMenu()">Orders</a>
          <a routerLink="/admin/reservations" routerLinkActive="active" (click)="closeAdminMenu()">Reservations</a>
          <a routerLink="/admin/events" routerLinkActive="active" (click)="closeAdminMenu()">Events</a>
        </div>
      </div>
    </div>

    <!-- Right side (desktop) -->
    <div class="nav-auth desktop">
      <ng-container *ngIf="auth.isLoggedIn(); else guestLinksDesktop">
        <span class="nav-user">
          {{ auth.currentUser?.name || auth.currentUser?.email }}
        </span>
        <button type="button" class="nav-btn" (click)="logout()">Logout</button>
      </ng-container>

      <ng-template #guestLinksDesktop>
        <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Login</a>
        <a routerLink="/register" routerLinkActive="active" (click)="closeMenu()">Register</a>
      </ng-template>
    </div>

    <!-- Mobile hamburger -->
    <button
      type="button"
      class="hamburger mobile"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-controls="mobileMenu"
      aria-label="Toggle menu"
    >
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile overlay -->
  <div class="overlay" *ngIf="menuOpen" (click)="closeMenu()" aria-hidden="true"></div>

  <!-- Mobile drawer -->
  <aside class="drawer" [class.open]="menuOpen" id="mobileMenu">
    <div class="drawer-head">
      <span class="drawer-title">Menu</span>
      <button type="button" class="icon-btn" (click)="closeMenu()" aria-label="Close menu">✕</button>
    </div>

    <div class="drawer-links">
      <a routerLink="/menu" routerLinkActive="active" (click)="closeMenu()">Menu</a>

      <a *ngIf="auth.isLoggedIn()" routerLink="/orders" routerLinkActive="active" (click)="closeMenu()">Orders</a>
      <a *ngIf="auth.isLoggedIn()" routerLink="/reservations" routerLinkActive="active" (click)="closeMenu()">Reservations</a>
      <a *ngIf="auth.isLoggedIn()" routerLink="/events" routerLinkActive="active" (click)="closeMenu()">Events</a>

      <!-- Mobile admin accordion -->
      <div *ngIf="auth.isAdmin()" class="drawer-admin">
        <button
          type="button"
          class="drawer-admin-trigger"
          (click)="toggleMobileAdminMenu()"
          [attr.aria-expanded]="mobileAdminMenuOpen"
        >
          <span>Admin tools</span>
          <span class="caret" [class.rotate]="mobileAdminMenuOpen">▾</span>
        </button>

        <div class="drawer-admin-links" *ngIf="mobileAdminMenuOpen">
          <a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Dashboard</a>
          <a routerLink="/admin/menu" routerLinkActive="active" (click)="closeMenu()">Menu</a>
          <a routerLink="/admin/orders" routerLinkActive="active" (click)="closeMenu()">Orders</a>
          <a routerLink="/admin/reservations" routerLinkActive="active" (click)="closeMenu()">Reservations</a>
          <a routerLink="/admin/events" routerLinkActive="active" (click)="closeMenu()">Events</a>
        </div>
      </div>
    </div>

    <div class="drawer-auth">
      <ng-container *ngIf="auth.isLoggedIn(); else guestLinksMobile">
        <div class="drawer-user">
          {{ auth.currentUser?.name || auth.currentUser?.email }}
        </div>
        <button type="button" class="nav-btn full" (click)="logout()">Logout</button>
      </ng-container>

      <ng-template #guestLinksMobile>
        <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Login</a>
        <a routerLink="/register" routerLinkActive="active" (click)="closeMenu()">Register</a>
      </ng-template>
    </div>
  </aside>
</header>
